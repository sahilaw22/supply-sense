# Fly.io deployment configuration for SupplySense Backend

app = "supplysense-backend"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile.backend"

[env]
  PORT = "8000"
  DATABASE_PATH = "/data/supplysense.db"

[[mounts]]
  source = "supplysense_data"
  destination = "/data"

[[services]]
  protocol = "tcp"
  internal_port = 8000
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.http_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    path = "/health"
    method = "get"
