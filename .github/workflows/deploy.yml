name: Deploy Frontend to EC2
 
on:
  push:
    branches:
      - main
 
env:
  AWS_REGION: us-east-1
  INSTANCE_TYPE: t3a.medium
 
jobs:
  deploy:
    name: Provision EC2 & Deploy Container
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::906424543471:role/codebenders-automation-role
          aws-region: us-east-1
 
      - name: Create VPC resources and Security Group
        id: sg
        run: |
          # Get default VPC
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=isDefault,Values=true" \
            --query "Vpcs[0].VpcId" \
            --output text)
          echo "Using VPC: $VPC_ID"
 
          # Get a subnet in that VPC
          SUBNET_ID=$(aws ec2 describe-subnets \
            --filters "Name=vpc-id,Values=$VPC_ID" \
            --query "Subnets[0].SubnetId" \
            --output text)
          echo "Using Subnet: $SUBNET_ID"
 
          # Always create a fresh SG with unique name
          SG_NAME="deploy-sg-${{ github.run_id }}"
          echo "Creating security group: $SG_NAME"
          SG_ID=$(aws ec2 create-security-group \
            --group-name "$SG_NAME" \
            --description "CloudAngles frontend - HTTP + SSH (run ${{ github.run_id }})" \
            --vpc-id "$VPC_ID" \
            --query "GroupId" \
            --output text)
 
          aws ec2 authorize-security-group-ingress \
            --group-id "$SG_ID" --protocol tcp --port 22 --cidr 0.0.0.0/0
          aws ec2 authorize-security-group-ingress \
            --group-id "$SG_ID" --protocol tcp --port 80 --cidr 0.0.0.0/0
 
          echo "sg_id=$SG_ID" >> $GITHUB_OUTPUT
          echo "subnet_id=$SUBNET_ID" >> $GITHUB_OUTPUT
          echo "vpc_id=$VPC_ID" >> $GITHUB_OUTPUT
 
      - name: Create dynamic EC2 key pair
        id: keypair
        run: |
          KEY_NAME="deploy-key-${{ github.run_id }}"
 
          aws ec2 delete-key-pair --key-name "$KEY_NAME" 2>/dev/null || true
 
          aws ec2 create-key-pair \
            --key-name "$KEY_NAME" \
            --query "KeyMaterial" \
            --output text > /tmp/ec2_key.pem
 
          chmod 600 /tmp/ec2_key.pem
          echo "key_name=$KEY_NAME" >> $GITHUB_OUTPUT
          echo "Created key pair: $KEY_NAME"
 
      - name: Launch EC2 instance
        id: ec2
        run: |
          AMI_ID=$(aws ec2 describe-images \
            --owners amazon \
            --filters "Name=name,Values=ubuntu/images/hvm-ssd/ubuntu-jammy-22.04-amd64-server-*" \
            --query "Images | sort_by(@, &CreationDate)[-1].ImageId" \
            --output text)
 
          echo "Resolved AMI: $AMI_ID"
 
          INSTANCE_ID=$(aws ec2 run-instances \
            --image-id "$AMI_ID" \
            --instance-type "${{ env.INSTANCE_TYPE }}" \
            --key-name "${{ steps.keypair.outputs.key_name }}" \
            --security-group-ids "${{ steps.sg.outputs.sg_id }}" \
            --subnet-id "${{ steps.sg.outputs.subnet_id }}" \
            --associate-public-ip-address \
            --tag-specifications '[
               {
                 "ResourceType":"instance",
                 "Tags":[
                   {"Key":"Name","Value":"cloudangles-frontend"},
                   {"Key":"ManagedBy","Value":"github-actions"},
                   {"Key":"Project","Value":"codebenders"},
                   {"Key":"Environment","Value":"dev"},
                   {"Key":"Createdby","Value":"cloud.support"}
                 ]
               },
               {
                 "ResourceType":"volume",
                 "Tags":[
                   {"Key":"Name","Value":"cloudangles-frontend"},
                   {"Key":"Project","Value":"codebenders"},
                   {"Key":"Environment","Value":"dev"},
                   {"Key":"Createdby","Value":"cloud.support"}
                 ]
               }
             ]' \
            --query "Instances[0].InstanceId" \
            --output text)
 
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
 
      - name: Wait for EC2 to be running
        run: |
          echo "Waiting for instance to enter running state..."
          aws ec2 wait instance-running \
            --instance-ids ${{ steps.ec2.outputs.instance_id }}
          echo "Instance is running."
 
      - name: Get public IP address
        id: ip
        run: |
          PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids ${{ steps.ec2.outputs.instance_id }} \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)
          echo "public_ip=$PUBLIC_IP" >> $GITHUB_OUTPUT
          echo "Public IP: $PUBLIC_IP"
 
      - name: Wait for SSH to become available
        run: |
          PUBLIC_IP="${{ steps.ip.outputs.public_ip }}"
          echo "Polling SSH on $PUBLIC_IP ..."
          for i in $(seq 1 24); do
            if ssh -o StrictHostKeyChecking=no \
                   -o ConnectTimeout=5 \
                   -i /tmp/ec2_key.pem \
                   ubuntu@$PUBLIC_IP "echo ok" 2>/dev/null; then
              echo "SSH is ready."
              break
            fi
            echo "Attempt $i/24 — retrying in 10s..."
            sleep 10
          done
 
      - name: Copy project to EC2
        run: |
          PUBLIC_IP="${{ steps.ip.outputs.public_ip }}"
          ssh -o StrictHostKeyChecking=no -i /tmp/ec2_key.pem ubuntu@$PUBLIC_IP \
            "mkdir -p /home/ubuntu/app"
          rsync -avz \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='.env' \
            --exclude='*.md' \
            --exclude='*.log' \
            -e "ssh -o StrictHostKeyChecking=no -i /tmp/ec2_key.pem" \
            . \
            ubuntu@$PUBLIC_IP:/home/ubuntu/app/
 
      - name: Install Docker + AWS CLI, build & run container
        run: |
          PUBLIC_IP="${{ steps.ip.outputs.public_ip }}"
          ssh -o StrictHostKeyChecking=no \
              -i /tmp/ec2_key.pem \
              ubuntu@$PUBLIC_IP << 'ENDSSH'
            set -e
            cd /home/ubuntu/app
 
            echo "========================================"
            echo " [1/5] Updating system packages"
            echo "========================================"
            sudo apt-get update -y -q
            sudo apt install unzip -y
 
            echo "========================================"
            echo " [2/5] Installing Docker"
            echo "========================================"
            sudo apt-get install -y docker.io
            sudo systemctl enable docker
            sudo systemctl start docker
            sudo usermod -aG docker ubuntu
 
            echo "========================================"
            echo " [3/5] Installing AWS CLI v2"
            echo "========================================"
            curl -sSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o awscliv2.zip
            unzip -q awscliv2.zip
            sudo ./aws/install --update
            rm -rf aws awscliv2.zip
            aws --version
 
            echo "========================================"
            echo " [4/5] Installing Docker Compose"
            echo "========================================"
            COMPOSE_VERSION=$(curl -sSL https://api.github.com/repos/docker/compose/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
            sudo curl -sSL "https://github.com/docker/compose/releases/download/${COMPOSE_VERSION}/docker-compose-linux-x86_64" \
              -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
            docker-compose version
 
            echo "========================================"
            echo " [5/5] Building & Starting container"
            echo "========================================"
            if [ -f "docker-compose.yaml" ] || [ -f "docker-compose.yml" ]; then
              echo "docker-compose.yaml found — using Docker Compose..."
              sudo docker-compose down 2>/dev/null || true
              sudo docker-compose up -d --build
              sudo docker-compose ps
              echo "Compose stack is up."
            else
              echo "No docker-compose.yaml found — using Dockerfile..."
              sudo docker build -t cloudangles-frontend .
              sudo docker stop frontend-app 2>/dev/null || true
              sudo docker rm   frontend-app 2>/dev/null || true
              sudo docker run -d \
                --name frontend-app \
                --restart unless-stopped \
                -p 80:80 \
                cloudangles-frontend
              sudo docker ps
              echo "Container is up."
            fi
          ENDSSH
 
      - name: Remove PEM key and delete AWS key pair
        if: always()
        run: |
          rm -f /tmp/ec2_key.pem
          aws ec2 delete-key-pair \
            --key-name "${{ steps.keypair.outputs.key_name }}" 2>/dev/null || true
          echo "Key pair ${{ steps.keypair.outputs.key_name }} deleted from AWS."
 
      - name: Deploy complete — App URL
        run: |
          echo "NEXEN_APP_URL=http://${{ steps.ip.outputs.public_ip }}"
          echo ""
          echo "=============================================="
          echo "  DEPLOYMENT SUCCESSFUL"
          echo "  http://${{ steps.ip.outputs.public_ip }}"
          echo "=============================================="
          echo "Instance ID : ${{ steps.ec2.outputs.instance_id }}"
          echo "Public IP   : ${{ steps.ip.outputs.public_ip }}"
          echo "Region      : ${{ env.AWS_REGION }}"